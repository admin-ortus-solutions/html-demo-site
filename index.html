<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BNI Deira Dubai — Visitor Assistant</title>
<style>
  :root {
    --bni-red: #cf2030;
    --bni-red-dark: #a3141f;
    --ink: #1a1d24;
    --ink-soft: #5a606e;
    --line: #e6e3dc;
    --paper: #faf8f3;
    --bubble-bot: #ffffff;
    --bubble-user: #cf2030;
    --gold: #c9a24b;
    --shadow: 0 1px 2px rgba(26,29,36,.06), 0 8px 24px rgba(26,29,36,.06);
    --r: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(207,32,48,.06), transparent 60%),
      var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* Header */
  header {
    padding: 14px 18px;
    background: var(--bni-red);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 10px rgba(163,20,31,.25);
    z-index: 2;
  }
  .logo {
    width: 42px; height: 42px;
    border-radius: 11px;
    background: #fff;
    color: var(--bni-red);
    display: grid; place-items: center;
    font-weight: 800; font-size: 13px; letter-spacing: .5px;
    flex: none;
  }
  .titles h1 { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .titles p { font-size: 11.5px; opacity: .9; margin-top: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; opacity:.95; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,.25); }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .row { display: flex; }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: var(--r);
    font-size: 14px;
    line-height: 1.45;
    white-space: pre-wrap;
    box-shadow: var(--shadow);
    animation: pop .18s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .bot .bubble {
    background: var(--bubble-bot);
    color: var(--ink);
    border-bottom-left-radius: 5px;
    border: 1px solid var(--line);
  }
  .user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 5px;
  }
  .bubble strong { font-weight: 700; }
  .bubble .small { font-size: 12px; color: var(--ink-soft); display:block; margin-top:4px; }

  /* Quick reply chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 4px 6px; }
  .chip {
    border: 1px solid var(--bni-red);
    color: var(--bni-red);
    background: #fff;
    padding: 8px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: .14s;
    font-family: inherit;
  }
  .chip:hover { background: var(--bni-red); color: #fff; }
  .chip:active { transform: scale(.97); }

  /* Typing indicator */
  .typing { display: inline-flex; gap: 4px; padding: 13px 14px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--ink-soft);
    animation: blink 1.2s infinite both;
  }
  .typing span:nth-child(2){ animation-delay:.2s; }
  .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{ opacity:.25 } 40%{ opacity:1 } }

  /* Composer */
  .composer {
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
    background: var(--paper);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .composer textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 11px 15px;
    font-size: 14px;
    font-family: inherit;
    max-height: 110px;
    background: #fff;
    color: var(--ink);
    outline: none;
  }
  .composer textarea:focus { border-color: var(--bni-red); }
  .send {
    width: 44px; height: 44px; flex: none;
    border: none; border-radius: 50%;
    background: var(--bni-red); color: #fff;
    font-size: 18px; cursor: pointer;
    display: grid; place-items: center;
    transition: .14s;
  }
  .send:hover { background: var(--bni-red-dark); }
  .send:active { transform: scale(.95); }

  .footnote { text-align:center; font-size:10px; color:var(--ink-soft); padding:4px 0 8px; }
  .footnote a { color: var(--bni-red); text-decoration: none; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">BNI</div>
    <div class="titles">
      <h1>BNI Deira Dubai</h1>
      <p>Visitor Assistant</p>
    </div>
    <div class="status"><span class="dot"></span> Online</div>
  </header>

  <main class="chat" id="chat" aria-live="polite"></main>

  <form class="composer" id="form" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Type your message…"></textarea>
    <button class="send" id="send" type="submit" aria-label="Send">➤</button>
  </form>
  <div class="footnote">Powered by BNI Deira Dubai · <a href="https://yess.ae" target="_blank" rel="noopener">Yess.ae</a></div>
</div>

<script src="chatbot.js"></script>
</body>
</html>
